<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulário</title>
    </head>
    <body>
        <h1>Formulário</h1>
        <form action = "#">
            <div>
                <label for = "name">Nome</label>
                <input type = "text" id = "name" name= "name" required/>
            </div>

            <div>
                <label for = "email">E-mail</label>
                <input type = "email" id = "email" name= "email" required/>
            </div>

            <div>
                <label for = "senha">Senha</label>
                <input type = "password" id = "senha" name= "senha" required/>
            </div>

            <div>
                <label for = "idade">Idade</label>
                <input type = "number" id = "idade" name= "idade" required min = "0" max = "130" />
            </div>

            <div>
                <label for = "genero">Gênero</label>
                <select id = genero" name = "genero">
                    <option value = "feminino">Feminino</option>
                    <option value = "masculino">Masculino</option>

                </select>
            </div>

            <div>
                <label for = "termos">Aceitar termos</label>
                <input type ="checkbox" id = "termos name = "termos" checked>
            </div>

            <div>
                <label for = "cor">Sua cor favorita</label>
                <input type = "color" id = "cor" name = "cor"/>
            </div>

            <div>
                <label for = "anexo">Anexo</label>
                <input type = "file" id = "anexo" name = "anexo"/>
            </div>

            <div>
                <label for = "comentario">Comentário</label>
                <textarea id = "comentario" name = "comentario" cols = "50" rows = "10"></textarea>
            </div>

            <div>
                <input type = "submit" value = "Enviar"/>
            </div>

        </form>
    </body>
</html>
